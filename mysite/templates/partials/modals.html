{% load static %}

<div class="offcanvas offcanvas-end" tabindex="-1" id="menu">
    <div class="offcanvas-body">
        <picture data-bs-dismiss="offcanvas" class="close">
            <img src="{% static 'img/close.svg' %}" alt="" width="10" height="10">
        </picture>
        <div class="row">
            <div class="col">
                <button class="d-flex m-4 d-md-none catalog {% if request.path == '/library/' %} active_catalog {% endif %}" onclick="window.location.href = '{% url 'catalog:library' %}';">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M8.75 4.7478L18.25 4.75255M8.75 10L18.25 10.0047M8.75 15.25H18.25M1.75 4.7478L4.25 4.74948M1.75 10L4.25 10.0017M1.75 15.25H4.25"
                            stroke="#131313" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Библиотека
                </button>
                <ul>
                    <li>
                        <a href="{% url 'catalog:company' %}" {% if request.path == '/company/' %} class="active" {% endif %}>Компания</a>
                        <ul>
                            <li><a href="{% url 'catalog:origins' %}" {% if request.path == '/company/origins/' %} class="active" {% endif %}>Истоки</a></li>
                            <li><a href="{% url 'catalog:about-product' %}" {% if request.path == '/company/about-product/' %} class="active" {% endif %}>О продукте</a></li>
                            <li><a href="{% url 'catalog:projects' %}" {% if request.path == '/company/projects/' %} class="active" {% endif %}>Проекты</a></li>
                            <li><a href="{% url 'catalog:team' %}" {% if request.path == '/company/team/' %} class="active" {% endif %}>Команда</a></li>
                        </ul>
                    </li>
                    <li><a href="{% url 'catalog:news' %}" {% if request.path == '/news/' %} class="active" {% endif %}>Новости</a></li>
                    <li><a href="{% url 'catalog:contacts' %}" {% if request.path == '/contacts/' %} class="active" {% endif %}>Контакты</a></li>
                </ul>
                <div class="social_block mt-3">
                    <a href="https://facebook.com/sandco.kz/" target="_blank">
                        <picture>
                            <img src="{% static 'img/fb_white.svg' %}" alt="">
                        </picture>
                    </a>
                    <a href="https://youtube.com/@sandco_kz/" target="_blank">
                        <picture>
                            <img src="{% static 'img/you_white.svg' %}" alt="">
                        </picture>
                    </a>
                    <a href="https://www.instagram.com/sandco.kz/" target="_blank">
                        <picture>
                            <img src="{% static 'img/inst_white.svg' %}" alt="">
                        </picture>
                    </a>
                    <a href="https://www.linkedin.com/company/sandco-kz/" target="_blank">
                        <picture>
                            <img src="{% static 'img/linkedin_white.svg' %}" alt="">
                        </picture>
                    </a>
                    <a href="https://x.com/sandco_kz" target="_blank">
                        <picture>
                            <img src="{% static 'img/x_white.svg' %}" alt="">
                        </picture>
                    </a>
                </div>
                <!--
                <div class="dropdown">
                    <button class="language w-100" id="dropdownMenuButton2" data-bs-toggle="dropdown">
                        Ру
                        <picture>
                            <img src="{% static 'img/arrow_down.svg' %}" alt="">
                        </picture>
                    </button>
                    <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton2">
                        <li><a class="dropdown-item" href="#">Ру</a></li>
                        <li><a class="dropdown-item" href="#">En</a></li>
                        <li><a class="dropdown-item" href="#">Кз</a></li>
                    </ul>
                </div>
                -->
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="application" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Онлайн заявка</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form action="{% url 'catalog:application' %}" method="post" class="needs-validation" novalidate>
                    {% csrf_token %}
                    <div class="form-floating mb-3">
                        <input type="text" name="name" class="form-control" id="floatingName" placeholder="Ваше имя" required>
                        <label for="floatingName">Ваше имя</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" name="phone" class="phonee form-control" id="floatingPhone" placeholder="Ваш телефон" required>
                        <label for="floatingPhone">Ваш телефон</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" name="email" class="form-control" id="floatingEmail" placeholder="Ваш E-mail">
                        <label for="floatingEmail">Ваш E-mail</label>
                    </div>
                    <!-- Добавьте reCAPTCHA -->
                    <div class="mb-3">
                        <div class="g-recaptcha" data-sitekey="6Lf4Aw0qAAAAAF6AfYQuGPC7b2CpaF-oFLuJO-by"></div>
                    </div>
                    <button class="application" type="submit">
                        Отправить заявку
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% for year in history %}
    <div class="modal fade" id="year_{{ year.id }}" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">{{ year.year }}</h2>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    {{ year.text|safe }}
                </div>
            </div>
        </div>
    </div>
{% endfor %}
